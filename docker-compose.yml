services:
  postgres:
    image: postgres:17-alpine
    container_name: safedose-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-safedose}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-safedose123}
      POSTGRES_DB: ${DB_NAME:-safedose_dev}
    volumes:
      - safedose_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-safedose} -d ${DB_NAME:-safedose_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  safedose_pgdata:
